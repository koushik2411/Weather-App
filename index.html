<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link href="/src/output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="text-slate-800">
    <!--   HEADER start   -->
    <header class="border-b p-2 px-3 flex justify-between">
      <h3 class="font-bold text-2xl text-slate-800 text-shadow-md">Weather App</h3>

      <button class="bg-transparent lg:hidden">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>
    <!--   HEADER end-->

    <main class="w-full flex flex-col items-center gap-3 pb-5">
      <!--  USER INPUT SECTION start   -->
      <section
        class="py-5 w-[95vw] mt-3 flex flex-col lg:flex-row gap-3 items-center justify-center"
      >
        <!--   Input  -->
        <div class="">
          <input
            type="text"
            placeholder="Enter a city name"
            id="inputBox"
            class="border border-slate-100 bg-[#ffffff4d] p-3 rounded-lg w-[70vw] outline-slate-100 boxShadow focus:scale-[1.1] lg:focus:scale-[1] transition-all"
          />
          <div
            id="dropdownDiv"
            class="absolute w-[70vw] mt-2 bg-[#f4f4f49d] border border-slate-500 rounded-xl shadow-2xl z-50 hidden"
          ></div>
        </div>

        <!--  Buttons   -->
        <div class="flex gap-2">
          <button
            id="searchBtn"
            class="p-2 text-xl px-2.5 onHover onActive transition-all bg-blue-600 rounded-lg text-slate-100 boxShadow cursor-pointer"
          >
            <i class="fa-solid fa-magnifying-glass-location"></i>
          </button>

          <button
            id="locBtn"
            class="p-2 text-xl px-2.5 onHover onActive transition-all bg-green-600 rounded-lg text-slate-100 boxShadow cursor-pointer"
          >
            <i class="fa-solid fa-location-dot"></i>
          </button>
        </div>
      </section>
      <!--  USER INPUT SECTION end   -->

      <!--   MAIN WEATHER DISPLAY SECTION start-->
      <section
        id="weatherCard"
        class="w-[80vw] p-3 py-5 lg:p-7 bg-[#ffffff4d] flex flex-col items-center rounded-3xl boxShadow"
      >
        <!--   upper section   -->
        <main
          class="w-[92%] pb-4 flex flex-col md:flex-row gap-7 justify-between items-center"
        >
          <article
            class="w-full px-1 flex flex-col wrap-break-word lg:flex-row lg:items-center"
          >
            <div class="">
              <h2 id="cityName" class="text-3xl font-semibold text-wrap"></h2>

              <p id="date" class="font-semibold text-slate-700"></p>
            </div>

            <h1
              id="mainTemp"
              class="mt-3 lg:ml-7 text-5xl font-extrabold text-slate-700"
            ></h1>
          </article>

          <article class="w-[20vw] flex flex-col items-center">
            <i
              id="weatherIcon"
              class="fas fa-cloud-sun text-7xl text-yellow-300"
            ></i>

            <p id="conditionText" class="font-semibold text-slate-700 mt-2"></p>
          </article>
        </main>

        <!--   lower section   -->
        <main
          class="w-[90%] grid grid-cols-3 gap-5 mt-4 border-t border-slate-800 pt-8 justify-items-center"
        >
          <!--humidity-->
          <article class="">
            <i class="fas fa-tint text-blue-400 mb-3 text-xl"></i>
            <p class="text-sm text-slate-700">Humidity</p>
            <p id="humidityVal" class="font-bold"></p>
          </article>

          <!--wind speed-->
          <article class="">
            <i class="fas fa-wind text-blue-200 mb-3 text-xl"></i>
            <p class="text-sm text-slate-700">Wind</p>
            <p id="windVal" class="font-bold"></p>
          </article>

          <!--feels like-->
          <article class="">
            <i class="fas fa-thermometer-half text-red-400 mb-3 text-xl"></i>
            <p class="text-sm text-slate-700">Real Feel</p>
            <p id="feelVal" class="font-bold"></p>
          </article>
        </main>
      </section>
      <!--   MAIN WEATHER DISPLAY SECTION end   -->

      <!--   5 DAYS WEATHER SECTION start   -->
      <section class=" w-[80vw] flex flex-col lg:flex-row gap-1 items-center justify-center mt-3">
        <h3 class=" w-full font-semibold text-lg text-left border-b">5-Days Forecast</h3>

        <main
          id="displaySection"
          class="w-full p-3 py-5 lg:p-7 grid grid-cols-2 md:grid-cols-5 gap-4 justify-items-center"
        ></main>
      </section>
      <!--   5 DAYS WEATHER SECTION end   -->

      <!--   ERROR SECTION start   -->
      <div
        id="errorDiv"
        class="fixed top-[35%] right-10 bg-red-600 text-red-50 px-6 py-4 rounded-xl shadow-2xl transition-opacity duration-200 opacity-0"
      >
        <p id="errorText"></p>
      </div>
      <!--   ERROR SECTION end   -->

      <script src="script.js"></script>
    </main>
  </body>
</html>
