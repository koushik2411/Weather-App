<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link href="/src/output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class=" text-slate-800">

    <!--   HEADER start   -->
    <header class=" border-b p-2 px-3 flex justify-between">
      <h3 class="font-bold text-2xl">Weather App</h3>

      <button class="bg-transparent lg:hidden">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>
    <!--   HEADER end-->

    <main class=" w-full flex flex-col items-center gap-5 pb-5">
      <!--  USER INPUT SECTION start   -->
      <section class=" py-5 w-[95vw] mt-3 flex flex-col lg:flex-row gap-3 items-center justify-center">
        <!--   Input  -->
        <input
          type="text"
          placeholder="Enter a city name"
          id="inputBox"
          class=" border border-slate-100 bg-[#ffffff3d] p-3 rounded-lg w-[65vw] outline-slate-100 boxShadow focus:scale-[1.1] transition-all"
        />

        <!--  Buttons   -->
        <div class=" flex gap-2">
          <button id="searchBtn" class=" p-2 text-xl px-2.5 onHover onActive transition-all bg-blue-600 rounded-lg text-slate-100 boxShadow">
            <i class="fa-solid fa-magnifying-glass-location"></i>
          </button>

          <button id="locBtn" class=" p-2 text-xl px-2.5 onHover onActive transition-all bg-green-600 rounded-lg text-slate-100 boxShadow">
            <i class="fa-solid fa-location-dot"></i>
          </button>
        </div>
      </section>
      <!--  USER INPUT SECTION end   -->

      <!--   MAIN WEATHER DISPLAY SECTION start-->
         <section id="weatherCard" class=" w-[80vw] p-3 py-5 lg:p-7 bg-[#ffffff3d] flex flex-col items-center rounded-3xl boxShadow">

            <!--   upper section   -->
            <main class=" w-[90%] pb-4 flex flex-col lg:flex-row gap-7 justify-between items-center">
                <article class="">
                    <h2 id="cityName" class=" text-3xl font-semibold">
                    Jamshedpur
                    </h2>

                    <p id="date" class=" font-semibold text-slate-700">
                        23 March
                    </p>

                    <h1 id="mainTemp" class=" mt-3 text-4xl font-extrabold text-slate-700">
                        33
                    </h1>
                </article>

                <article class="">
                    <i id="weather-icon" class="fas fa-cloud-sun text-7xl text-yellow-400"></i>

                    <p id="conditionText" class=" font-semibold text-slate-700">Partly Cloudy</p>
                </article>
            </main>

            <!--   lower section   -->
            <main class=" w-[90%] grid grid-cols-3 gap-5 mt-5 border-t border-slate-800 pt-8">
                <!--humidity-->
                <article class="">
                    <i class="fas fa-tint text-blue-400 mb-3 text-xl"></i>
                    <p class="text-sm text-slate-700">Humidity</p>
                    <p id="humidityVal" class="font-bold">65%</p>
                </article>

                <!--wind speed-->
                <article class="">
                    <i class="fas fa-wind text-blue-200 mb-3 text-xl"></i>
                    <p class="text-sm text-slate-700">Wind</p>
                    <p id="windVal" class="font-bold">12 km/h</p>
                </article>

                <!--feels like-->
                <article class="">
                    <i class="fas fa-thermometer-half text-red-400 mb-3 text-xl"></i>
                    <p class="text-sm text-slate-700">Real Feel</p>
                    <p id="feelVal" class="font-bold">26°C</p>
                </article>
            </main>
         </section>
      <!--   MAIN WEATHER DISPLAY SECTION end   -->

      <!--   5 DAYS WEATHER SECTION start   -->
         <section class=" w-[80vw] p-3 py-5 lg:p-7 ">
         </section>
      <!--   5 DAYS WEATHER SECTION end   -->

      <!--   ERROR SECTION start   -->
         <div id="errDiv" class=" fixed bottom-5 right-5 bg-red-600 text-red-50 px-6 py-4 rounded-xl shadow-2xl transform translate-y-20 transition-transform duration-300">
            <p id="errorText">
                City not found!
            </p>
         </div>
      <!--   ERROR SECTION end   -->

    </main>
  </body>
</html>
